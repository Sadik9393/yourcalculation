<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="40%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    
    <!-- C Gradient -->
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Swoosh Gradient -->
    <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.3" />
    </linearGradient>
  </defs>

  <!-- Rounded Square Container -->
  <rect x="20" y="20" width="472" height="472" rx="110" fill="url(#bgGrad)" />

  <!-- Bottom Swoosh -->
  <path d="M 80 350 Q 120 440, 310 420 Q 150 400, 80 350 Z" fill="url(#swooshGrad)" />

  <!-- The Bold White Y -->
  <path d="M 90 135 L 170 135 L 220 245 L 270 135 L 350 135 L 260 245 L 260 365 L 180 365 L 180 245 Z" fill="#FFFFFF" />

  <!-- Stylized Letter C -->
  <path d="M 390 190 A 110 110 0 1 0 390 410" fill="none" stroke="url(#cGrad)" stroke-width="52" stroke-linecap="round" />

  <!-- Floating Digital Pixels -->
  <rect x="425" y="135" width="18" height="18" rx="4" fill="#38bdf8" />
  <rect x="445" y="160" width="14" height="14" rx="3" fill="#0ea5e9" />
  <rect x="425" y="185" width="16" height="16" rx="3.5" fill="#34d399" />
  <rect x="450" y="110" width="10" height="10" rx="2" fill="#38bdf8" />

  <!-- Calculator Icon Inside C -->
  <!-- Rounded Calculator Body -->
  <rect x="295" y="235" width="95" height="125" rx="14" fill="#FFFFFF" />
  <!-- Calculator Screen -->
  <rect x="310" y="250" width="65" height="22" rx="4" fill="#1e293b" />
  <!-- Buttons -->
  <!-- Plus Button -->
  <rect x="310" y="282" width="28" height="20" rx="3" fill="#2563eb" />
  <text x="324" y="297" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" text-anchor="middle">+</text>
  
  <!-- Minus Button -->
  <rect x="347" y="282" width="28" height="20" rx="3" fill="#2563eb" />
  <text x="361" y="297" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" text-anchor="middle">-</text>
  
  <!-- Multiply Button -->
  <rect x="310" y="312" width="28" height="20" rx="3" fill="#2563eb" />
  <text x="324" y="327" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="bold" font-size="14" text-anchor="middle">×</text>
  
  <!-- Equals Button -->
  <rect x="347" y="312" width="28" height="20" rx="3" fill="#10b981" />
  <text x="361" y="327" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" text-anchor="middle">=</text>
</svg>
